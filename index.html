<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>In Manutenzione</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --accent: #c8f560;
      --text: #f0ede6;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,245,96,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,245,96,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: var(--accent);
      color: #0e0e0e;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 100px;
      margin-bottom: 2rem;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 1.05;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--accent);
    }

    p {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 2.5rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 2.5rem;
      border-radius: 2px;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="badge">● Lavori in corso</div>
    <h1>Stiamo<br>arrivando <span>presto.</span></h1>
    <div class="divider"></div>
    <p>Il sito è in fase di costruzione. Torna a trovarci tra poco, stiamo preparando qualcosa di bello.</p>
  </div>

  <div class="footer">© 2025 — La tua Associazione</div>

</body>
</html>
